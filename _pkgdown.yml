url: https://mothur.org/strollur/
template:
  bootstrap: 5
  light-switch: true

reference:
- title: Getting Started
  desc: "Adding and using data"
  contents:
  - add
  - assign
  - names
  - count
  - abundance
  - report
  - summary
  - dataset
  - strollur-package
  - get_bin_types
- title: Importing Data
  desc: "Importing from other software tools namely: mothur, qiime2, phyloseq and DADA2"
  contents:
  - starts_with("read_")
  - unpack_qiime2_artifact
- title: General
  desc: "Create datasets and references, clear data"
  contents:
  - miseq_sop_example
  - new_dataset
  - new_reference
  - clear
  - is_aligned
  - has_sample
- title: Data Transfers
  desc: "Save, copy, load, import, export and write to file"
  contents:
  - save_dataset
  - load_dataset
  - export_dataset
  - import_dataset
  - copy_dataset
  - starts_with("write_")
- title: Functions for Package Developers
  desc: "Want to create and modify dataset objects from your package? Check out these functions"
  contents:
  - strollur_example
  - get_available_processors
  - has_sequence_strings
  - added_message
  - assigned_message
  - remove_file
  - sort_dataframe
  - starts_with("xdev_")
  - starts_with("xint_")
